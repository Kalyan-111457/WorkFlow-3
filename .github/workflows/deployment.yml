name: Deployment
on:
  push:
    branches:
      - main

jobs:
  installation_dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

  runningAllCodes:
    needs: installation_dependencies
    runs-on: ubuntu-latest        
    steps:
      - name: Checkout code       
        uses: actions/checkout@v3

      - name: Install Node.js     
        uses: actions/setup-node@v3
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Deploy Code
        run: echo "Deploying"